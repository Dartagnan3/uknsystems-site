<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>UKN Systems</title>
  <meta name="description" content="UKN Systems develops governance, safety, and reliability frameworks for autonomous and AI-assisted systems.">
  <style>
    :root {
      --bg: #f7f7f4;
      --text: #161616;
      --muted: #5f6368;
      --line: #d9d9d2;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px;
    }

    main {
      width: 100%;
      max-width: 760px;
    }

    .eyebrow {
      font-size: 13px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 28px;
    }

    h1 {
      font-size: clamp(44px, 8vw, 84px);
      line-height: 0.95;
      letter-spacing: -0.055em;
      margin: 0 0 28px;
      font-weight: 650;
    }

    h2 {
      font-size: clamp(24px, 4vw, 40px);
      line-height: 1.08;
      letter-spacing: -0.035em;
      margin: 0 0 28px;
      font-weight: 520;
      max-width: 680px;
    }

    p {
      font-size: clamp(18px, 2vw, 22px);
      line-height: 1.45;
      color: var(--muted);
      max-width: 660px;
      margin: 0 0 48px;
    }

    footer {
      border-top: 1px solid var(--line);
      padding-top: 24px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px 24px;
      font-size: 15px;
      color: var(--muted);
    }

    a {
      color: inherit;
      text-decoration: none;
      border-bottom: 1px solid var(--muted);
    }

    a:hover {
      color: var(--text);
      border-bottom-color: var(--text);
    }
  </style>
</head>
<body>
  <main>
    <div class="eyebrow">Vancouver, British Columbia</div>
<h1>UKN Systems</h1>

<h2>Governance Infrastructure for Autonomous Systems</h2>

<p>
  UKN Systems develops governance, safety, and reliability frameworks
  for autonomous and AI-assisted systems.
</p>

<footer>
  <span>UKN Systems Inc.</span>
  <span>Incorporated in British Columbia</span>
  <a href="mailto:info@uknsystems.com">info@uknsystems.com</a>
</footer>
  </main>
</body>
</html>
